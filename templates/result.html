<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PlantCare AI | Result</title>
	<style>
		:root {
			--bg: #f5faf5;
			--card: #ffffff;
			--text: #1f2937;
			--muted: #4b5563;
			--primary: #1f8f43;
			--border: #d1d5db;
			--ok-bg: #ecfdf5;
			--ok-text: #166534;
			--warn-bg: #fffbeb;
			--warn-text: #92400e;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: var(--bg);
			color: var(--text);
		}

		.navbar {
			background: #fff;
			border-bottom: 1px solid #e5e7eb;
		}

		.nav-wrap {
			max-width: 900px;
			margin: 0 auto;
			padding: 14px 20px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			flex-wrap: wrap;
		}

		.brand {
			text-decoration: none;
			color: #166534;
			font-weight: 700;
		}

		.nav-links {
			display: flex;
			gap: 14px;
			flex-wrap: wrap;
		}

		.nav-links a {
			text-decoration: none;
			color: var(--muted);
			font-weight: 600;
		}

		.nav-links a:hover {
			color: #14532d;
		}

		.container {
			min-height: calc(100vh - 70px);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.card {
			width: 100%;
			max-width: 700px;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 24px;
		}

		h1 {
			margin-top: 0;
		}

		.meta {
			display: grid;
			gap: 10px;
			margin: 12px 0 14px;
		}

		.chip {
			border-radius: 8px;
			padding: 10px 12px;
			width: fit-content;
			font-weight: 700;
		}

		.healthy {
			background: var(--ok-bg);
			color: var(--ok-text);
			border: 1px solid #a7f3d0;
		}

		.diseased {
			background: var(--warn-bg);
			color: var(--warn-text);
			border: 1px solid #fde68a;
		}

		img {
			width: 100%;
			max-width: 380px;
			border-radius: 10px;
			border: 1px solid #d1d5db;
		}

		.actions {
			margin-top: 18px;
		}

		.btn {
			text-decoration: none;
			background: var(--primary);
			color: #fff;
			padding: 10px 14px;
			border-radius: 8px;
			font-weight: 700;
		}
	</style>
</head>
<body>
	<header class="navbar">
		<div class="nav-wrap">
			<a href="{{ url_for('home') }}" class="brand">PlantCare AI</a>
			<nav class="nav-links">
				<a href="{{ url_for('home') }}">Home</a>
				<a href="{{ url_for('about') }}">About</a>
				<a href="{{ url_for('upload_page') }}">Upload</a>
			</nav>
		</div>
	</header>

	<main class="container">
		<section class="card">
			<h1>Disease Detection Result</h1>

			<div class="meta">
				<p><strong>Predicted Class:</strong> {{ prediction }}</p>
				<p><strong>Confidence:</strong> {{ '%.2f'|format(confidence * 100) }}%</p>
				<span class="chip {{ 'healthy' if health_status == 'Healthy' else 'diseased' }}">
					{{ health_status }}
				</span>
			</div>

			{% if uploaded_image %}
				<img src="{{ uploaded_image }}" alt="Uploaded leaf image">
			{% endif %}

			<div class="actions">
				<a class="btn" href="{{ url_for('upload_page') }}">Analyze Another Image</a>
			</div>
		</section>
	</main>
</body>
</html>
